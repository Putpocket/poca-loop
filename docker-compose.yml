services:
  api:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      APP_NAME: ${APP_NAME:-poca-loop}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      SECRET_KEY: ${SECRET_KEY:-}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql+psycopg://pocaloop:pocaloop_example_password@db:5432/pocaloop}
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379/0}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,http://192.168.10.203:8080,http://localhost:5173,http://192.168.10.203:5173}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-admin}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "alembic upgrade head &&
             python -m app.db.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pocaloop}
      POSTGRES_USER: ${POSTGRES_USER:-pocaloop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pocaloop_example_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${FRONTEND_API_BASE_URL:-}
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  postgres_data:
